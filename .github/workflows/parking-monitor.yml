name: Parking Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run parking check
        env:
          GITHUB_ACTIONS: "true"
          PARKING_MONITOR_DESKTOP_TOAST: "false"
          PARKING_MONITOR_DISCORD_WEBHOOK_URL: ${{ secrets.PARKING_MONITOR_DISCORD_WEBHOOK_URL }}
        run: node src/index.js check

      - name: Commit updated monitor state
        run: |
          if git diff --quiet -- data/state.json; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git commit -m "chore: update parking monitor state"
          git push
